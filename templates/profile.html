{% extends "base.html" %}
{% block title %}پروفایل{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-header bg-transparent border-0 text-center pt-4">
                <i class="bi bi-person display-1 text-primary"></i>
                <h3 class="fw-bold" style="color: #1a2a6c;">ویرایش پروفایل</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('user.profile') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">نام و نام خانوادگی</label>
                        <input type="text" class="form-control" name="full_name" value="{{ user.full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">شماره موبایل</label>
                        <input type="tel" class="form-control" name="phone" value="{{ user.phone }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">ایمیل</label>
                        <input type="email" class="form-control" name="email" value="{{ user.email or '' }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                        <i class="bi bi-check2"></i> ذخیره تغییرات
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

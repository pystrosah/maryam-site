{% extends "base.html" %}
{% block title %}ثبت‌نام{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-header bg-transparent border-0 text-center pt-4">
                <i class="bi bi-person-plus display-1 text-success"></i>
                <h3 class="fw-bold mt-2" style="color: #1a2a6c;">ثبت‌نام</h3>
                <p class="text-muted">عضو جدید کانون فرهنگی مریم شوید</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">نام و نام خانوادگی</label>
                        <input type="text" class="form-control" name="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">نام کاربری</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">شماره موبایل</label>
                        <input type="tel" class="form-control" name="phone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">ایمیل (اختیاری)</label>
                        <input type="email" class="form-control" name="email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">رمز عبور</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold">
                        <i class="bi bi-person-plus"></i> ثبت‌نام
                    </button>
                </form>
                <hr>
                <p class="text-center">قبلاً ثبت‌نام کرده‌اید؟ <a href="{{ url_for('auth.login') }}" class="fw-bold">ورود</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

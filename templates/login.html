{% extends "base.html" %}
{% block title %}ورود{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-header bg-transparent border-0 text-center pt-4">
                <i class="bi bi-box-arrow-in-right display-1 text-primary"></i>
                <h3 class="fw-bold mt-2" style="color: #1a2a6c;">ورود</h3>
                <p class="text-muted">به کانون فرهنگی مریم خوش آمدید</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">نام کاربری</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">رمز عبور</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                        <i class="bi bi-box-arrow-in-right"></i> ورود
                    </button>
                </form>
                <hr>
                <p class="text-center">حساب کاربری ندارید؟ <a href="{{ url_for('auth.register') }}" class="fw-bold">ثبت‌نام کنید</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
